<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的第一个网站</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #222;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    nav {
      background: #34495e;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    main {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }

    section {
      margin-bottom: 30px;
    }

    h1, h2 {
      margin-top: 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .button {
      display: inline-block;
      background: #3498db;
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>至诚生物技术中心</h1>
    <p>这是我用 GitHub Pages 免费创建的网站</p>
  </header>

  <nav>
    <a href="#about">关于我</a>
    <a href="#work">我的内容</a>
    <a href="#contact">联系我</a>
  </nav>

  <main>
    <section id="about">
      <h2>关于我</h2>
      <p>这里可以写你的个人介绍、课题介绍、公司介绍、项目介绍，或者任何你想展示的内容。</p>
    </section>

    <section id="work">
      <h2>我的内容</h2>
     <img src="pepper.jpg" alt="图片" style="max-width:100%; border-radius:12px;">
</section>
      <a class="button" href="#contact">联系我</a>
    </section>

    <section id="contact">
      <h2>联系我</h2>
      <p>邮箱：yourname@example.com</p>
      <p>微信：这里填写你的微信号</p>
    </section>
  </main>

  <footer>
    <p>© 2026 我的网站 版权所有</p>
  </footer>

</body>
</html>
